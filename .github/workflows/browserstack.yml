name: BrowserStack Cross-Browser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  browserstack:
    if: ${{ secrets.BROWSERSTACK_USERNAME != '' && secrets.BROWSERSTACK_ACCESS_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Astro dependencies
        run: npm ci
        working-directory: astro-site

      - name: Build Astro site
        run: npm run build:astro

      - name: Serve built site
        run: npx http-server astro-site/dist -p 4173 &

      - name: Run BrowserStack smoke tests
        run: npm run test:browserstack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
