name: BrowserStack Cross-Browser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  browserstack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    steps:
      - name: Checkout with fallback
        uses: ./.github/actions/checkout-with-fallback

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: corepack pnpm -w install --frozen-lockfile

      - name: Build Astro site
        run: npm run build:astro

      - name: Serve built site
        shell: bash
        run: |
          npx http-server astro-site/dist -p 4173 >/tmp/http-server.log 2>&1 &
          sleep 2

      - name: Validate BrowserStack credentials (scheduled runs)
        if: ${{ github.event_name == 'schedule' && (env.BROWSERSTACK_USERNAME == '' || env.BROWSERSTACK_ACCESS_KEY == '') }}
        run: |
          echo "Scheduled BrowserStack run requires BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY secrets."
          exit 1

      - name: Run BrowserStack smoke tests (optional)
        shell: bash
        run: |
          if [ -n "$BROWSERSTACK_USERNAME" ] && [ -n "$BROWSERSTACK_ACCESS_KEY" ]; then
            npm run test:browserstack
          else
            echo "Skipping BrowserStack tests: optional secrets are not configured."
          fi
