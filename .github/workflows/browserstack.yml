name: BrowserStack Cross-Browser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  browserstack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o repo.tar.gz || curl -fsSL "$TAR_URL" -o repo.tar.gz
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf repo.tar.gz --strip-components=1
          rm -f repo.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm -w install --frozen-lockfile

      - name: Build Astro site
        run: npm run build:astro

      - name: Serve built site
        shell: bash
        run: |
          npx http-server apps/web/dist -p 4173 >/tmp/http-server.log 2>&1 &
          sleep 2

      - name: Run BrowserStack smoke tests (optional)
        shell: bash
        run: |
          if [ -n "$BROWSERSTACK_USERNAME" ] && [ -n "$BROWSERSTACK_ACCESS_KEY" ]; then
            npm run test:browserstack
          else
            echo "Skipping BrowserStack tests: optional secrets are not configured."
          fi
        env:
          BROWSERSTACK_USERNAME: ${{ secrets['BROWSERSTACK_USERNAME'] }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets['BROWSERSTACK_ACCESS_KEY'] }}
