name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          TMP_TAR="$RUNNER_TEMP/repo.tar.gz"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o "$TMP_TAR" || curl -fsSL "$TAR_URL" -o "$TMP_TAR"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$TMP_TAR" --strip-components=1
          rm -f "$TMP_TAR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions tests
        run: npm test
        working-directory: functions
        env:
          FIREBASE_CONFIG: '{"storageBucket":"ci-bucket.appspot.com"}'
          GCLOUD_PROJECT: ci-project

      - name: Site checks
        run: npm run check

      - name: Runtime parity assertion
        run: npm run ops:runtime-parity
        env:
          GH_ENVIRONMENT: production
          EXPECTED_NODE_MAJOR: "20"
          REQUIRED_ENV_KEYS: FIREBASE_PROJECT_ID,FIREBASE_SERVICE_ACCOUNT_PRODUCTION
          FIREBASE_PROJECT_ID: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}

      - name: Build Astro site
        run: npm run build:astro

      - name: Build admin-v3 hosting bundle
        run: npm run build:admin-v3:hosting

      - name: Technical SEO validation
        run: npm run seo:validate

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firebase production config
        shell: bash
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID_PRODUCTION" ]; then
            echo "Missing vars.FIREBASE_PROJECT_ID_PRODUCTION for environment 'production'."
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_PRODUCTION" ]; then
            echo "Missing secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION for environment 'production'."
            echo "Add full JSON for a Firebase Admin service account key."
            exit 1
          fi

      - name: Configure Firebase service-account auth
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}
        run: |
          KEY_FILE="$RUNNER_TEMP/firebase-service-account-production.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PRODUCTION" > "$KEY_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Deploy hosting and rules to production
        run: firebase deploy --project "${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}" --only "hosting,firestore:rules" --non-interactive

      - name: Deploy functions to production
        id: deploy_functions
        if: ${{ false }}
        continue-on-error: true
        run: firebase deploy --project "${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}" --only "functions" --non-interactive

      - name: Functions deploy status
        if: ${{ false }}
        run: |
          echo "Functions deployment did not complete."
          echo "Most likely billing is not enabled for Cloud Build/Artifact Registry."
          echo "Hosting and Firestore rules were still deployed successfully."

      - name: Functions deploy skipped
        if: ${{ always() }}
        run: |
          echo "Functions deployment is disabled in this workflow."
          echo "This is expected on Firebase Spark plan."

      - name: Post-deploy smoke check
        shell: bash
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        run: |
          set -e
          canonical_urls=(
            "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app/"
            "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app/sitemap.xml"
            "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app/admin-v3/"
          )

          for url in "${canonical_urls[@]}"; do
            echo "Checking ${url}"
            curl -4 -fsSL --retry 5 --retry-delay 4 --retry-all-errors --connect-timeout 15 --max-time 45 "${url}" >/dev/null
          done

          custom_domain_urls=(
            "https://georgiahills.com/"
            "https://georgiahills.com/sitemap.xml"
            "https://georgiahills.com/admin-v3/"
          )

          for url in "${custom_domain_urls[@]}"; do
            echo "Checking custom domain ${url}"
            if ! curl -4 -fsSL --retry 5 --retry-delay 4 --retry-all-errors --connect-timeout 15 --max-time 45 "${url}" >/dev/null; then
              echo "::warning::Custom domain check failed from GitHub runner for ${url}. Firebase hosting deploy is verified via web.app URL."
            fi
          done

      - name: Post-deploy homepage regression guard
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        run: |
          node scripts/audit/ops/check-homepage-regression.js "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app/" strict
          node scripts/audit/ops/check-homepage-regression.js "https://georgiahills.com/" warn
