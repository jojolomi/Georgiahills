name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      ENABLE_FUNCTIONS_DEPLOY: ${{ vars.ENABLE_FUNCTIONS_DEPLOY }}
    steps:
      - name: Checkout with fallback
        uses: ./.github/actions/checkout-with-fallback

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions tests
        run: npm test
        working-directory: functions
        env:
          FIREBASE_CONFIG: '{"storageBucket":"ci-bucket.appspot.com"}'
          GCLOUD_PROJECT: ci-project

      - name: Site checks
        run: npm run check

      - name: Runtime parity assertion
        run: npm run ops:runtime-parity
        env:
          GH_ENVIRONMENT: production
          EXPECTED_NODE_MAJOR: "20"
          REQUIRED_ENV_KEYS: FIREBASE_PROJECT_ID,FIREBASE_SERVICE_ACCOUNT_PRODUCTION
          FIREBASE_PROJECT_ID: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}

      - name: Build Astro site
        run: npm run build:astro

      - name: Build admin-v3 hosting bundle
        run: npm run build:admin-v3:hosting

      - name: Technical SEO validation
        run: npm run seo:validate

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firebase production config
        shell: bash
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID_PRODUCTION" ]; then
            echo "Missing vars.FIREBASE_PROJECT_ID_PRODUCTION for environment 'production'."
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_PRODUCTION" ]; then
            echo "Missing secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION for environment 'production'."
            echo "Add full JSON for a Firebase Admin service account key."
            exit 1
          fi

      - name: Configure Firebase service-account auth
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_PRODUCTION: ${{ secrets['FIREBASE_SERVICE_ACCOUNT_PRODUCTION'] }}
        run: |
          KEY_FILE="$RUNNER_TEMP/firebase-service-account-production.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PRODUCTION" > "$KEY_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Deploy hosting to production
        run: firebase deploy --project "${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}" --only "hosting" --non-interactive

      - name: Deploy firestore rules to production (non-blocking)
        id: deploy_firestore_rules
        continue-on-error: true
        run: firebase deploy --project "${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}" --only "firestore:rules" --non-interactive

      - name: Firestore rules deploy status
        if: ${{ steps.deploy_firestore_rules.outcome != 'success' }}
        run: |
          echo "Firestore rules deployment did not complete."
          echo "Most likely the service account is missing role serviceusage.serviceUsageConsumer or firestore permissions."
          echo "Hosting was still deployed successfully."

      - name: Deploy functions to production
        id: deploy_functions
        if: ${{ env.ENABLE_FUNCTIONS_DEPLOY == 'true' }}
        continue-on-error: true
        run: firebase deploy --project "${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}" --only "functions" --non-interactive

      - name: Functions deploy status
        if: ${{ env.ENABLE_FUNCTIONS_DEPLOY == 'true' && steps.deploy_functions.outcome != 'success' }}
        run: |
          echo "Functions deployment did not complete."
          echo "Most likely billing is not enabled for Cloud Build/Artifact Registry."
          echo "Hosting and Firestore rules were still deployed successfully."

      - name: Functions deploy skipped
        if: ${{ env.ENABLE_FUNCTIONS_DEPLOY != 'true' }}
        run: |
          echo "Functions deployment is disabled (vars.ENABLE_FUNCTIONS_DEPLOY != 'true')."
          echo "Set repository/environment variable ENABLE_FUNCTIONS_DEPLOY=true to enable it."

      - name: Post-deploy cutover smoke guard (production web.app strict)
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-cutover-smoke.js "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app" strict | tee /tmp/prod-cutover-webapp.log

      - name: Post-deploy cutover smoke guard (custom domain warn)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-cutover-smoke.js "https://georgiahills.com" warn | tee /tmp/prod-cutover-domain.log

      - name: Post-deploy homepage regression guard
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-homepage-regression.js "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app/" strict | tee /tmp/prod-homepage-webapp.log
          node scripts/audit/ops/check-homepage-regression.js "https://georgiahills.com/" warn | tee /tmp/prod-homepage-domain.log

      - name: Post-deploy delivery SLO guard (production web.app strict)
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-delivery-slo.js "https://${FIREBASE_PROJECT_ID_PRODUCTION}.web.app" strict | tee /tmp/prod-delivery-slo-webapp.log

      - name: Post-deploy delivery SLO guard (custom domain warn)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-delivery-slo.js "https://georgiahills.com" warn | tee /tmp/prod-delivery-slo-domain.log

      - name: Upload production diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-diagnostics
          retention-days: 7
          if-no-files-found: ignore
          path: |
            /tmp/prod-cutover-webapp.log
            /tmp/prod-cutover-domain.log
            /tmp/prod-homepage-webapp.log
            /tmp/prod-homepage-domain.log
            /tmp/prod-delivery-slo-webapp.log
            /tmp/prod-delivery-slo-domain.log

      - name: Production deploy summary
        if: always()
        shell: bash
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars['FIREBASE_PROJECT_ID_PRODUCTION'] }}
        run: |
          {
            echo "## Production Deploy Summary"
            echo ""
            echo "- Project: ${FIREBASE_PROJECT_ID_PRODUCTION}"
            echo "- Hosting deploy: attempted"
            echo "- Firestore rules deploy outcome: ${{ steps.deploy_firestore_rules.outcome }}"
            echo "- Functions deploy enabled: ${{ env.ENABLE_FUNCTIONS_DEPLOY == 'true' }}"
            if [ "${{ env.ENABLE_FUNCTIONS_DEPLOY }}" = "true" ]; then
              echo "- Functions deploy outcome: ${{ steps.deploy_functions.outcome }}"
            else
              echo "- Functions deploy outcome: skipped (opt-in disabled)"
            fi
            echo "- Smoke checks: web.app strict + custom domain warn"
            echo "- Delivery SLO: web.app strict + custom domain warn"
          } >> "$GITHUB_STEP_SUMMARY"
