name: Lighthouse Mobile Preview

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Production preview base URL (e.g. https://preview.example.com)"
        required: true
        type: string

jobs:
  lighthouse-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout with fallback
        uses: ./.github/actions/checkout-with-fallback

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Lighthouse (mobile) on EN/AR
        shell: bash
        run: |
          URL="${{ inputs.preview_url }}"
          mkdir -p artifacts/lighthouse
          npx lighthouse "$URL/en" --form-factor=mobile --output=json --output-path=artifacts/lighthouse/lhr-en.json --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage"
          npx lighthouse "$URL/ar" --form-factor=mobile --output=json --output-path=artifacts/lighthouse/lhr-ar.json --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage"

      - name: Assert mobile thresholds
        run: node scripts/audit/perf/assert-lighthouse-mobile.mjs artifacts/lighthouse

      - name: Upload Lighthouse JSON artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-json
          retention-days: 7
          path: artifacts/lighthouse/*.json

      - name: Lighthouse mobile summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Lighthouse Mobile Preview Summary"
            echo ""
            echo "- Base URL: ${{ inputs.preview_url }}"
            echo "- Routes tested: /en, /ar"
            echo "- Artifact: lighthouse-mobile-json"
          } >> "$GITHUB_STEP_SUMMARY"
