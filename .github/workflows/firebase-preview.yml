name: Staging Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "artifacts/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      FIREBASE_PROJECT_ID_STAGING: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
      FIREBASE_SERVICE_ACCOUNT_STAGING: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
    concurrency:
      group: firebase-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Runtime parity assertion
        if: ${{ env.FIREBASE_PROJECT_ID_STAGING != '' }}
        run: npm run ops:runtime-parity
        env:
          GH_ENVIRONMENT: staging
          EXPECTED_NODE_MAJOR: "20"
          REQUIRED_ENV_KEYS: FIREBASE_PROJECT_ID
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID_STAGING }}

      - name: Runtime parity skipped
        if: ${{ env.FIREBASE_PROJECT_ID_STAGING == '' }}
        run: |
          echo "Skipping runtime parity in staging preview: vars.FIREBASE_PROJECT_ID_STAGING is not configured."

      - name: Build Astro site
        run: npm run build:astro

      - name: Build admin-v3 hosting bundle
        run: npm run build:admin-v3:hosting

      - name: Check staging deploy prerequisites
        id: staging_precheck
        shell: bash
        run: |
          if [ -n "$FIREBASE_PROJECT_ID_STAGING" ] && [ -n "$FIREBASE_SERVICE_ACCOUNT_STAGING" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to staging preview channel
        if: ${{ steps.staging_precheck.outputs.ready == 'true' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ env.FIREBASE_SERVICE_ACCOUNT_STAGING }}"
          projectId: "${{ env.FIREBASE_PROJECT_ID_STAGING }}"
          expires: 7d

      - name: Post-deploy homepage regression guard (staging)
        if: ${{ steps.staging_precheck.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-homepage-regression.js "https://${FIREBASE_PROJECT_ID_STAGING}.web.app/" strict | tee /tmp/staging-homepage-regression.log

      - name: Post-deploy cutover smoke guard (staging)
        if: ${{ steps.staging_precheck.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-cutover-smoke.js "https://${FIREBASE_PROJECT_ID_STAGING}.web.app" strict | tee /tmp/staging-cutover-smoke.log

      - name: Post-deploy delivery SLO guard (staging)
        if: ${{ steps.staging_precheck.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/audit/ops/check-delivery-slo.js "https://${FIREBASE_PROJECT_ID_STAGING}.web.app" strict | tee /tmp/staging-delivery-slo.log

      - name: Deploy skipped
        if: ${{ steps.staging_precheck.outputs.ready != 'true' }}
        run: |
          echo "Skipping staging preview deploy: missing FIREBASE_PROJECT_ID_STAGING var or FIREBASE_SERVICE_ACCOUNT_STAGING secret."

      - name: Upload staging diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-preview-diagnostics
          retention-days: 7
          if-no-files-found: ignore
          path: |
            /tmp/staging-homepage-regression.log
            /tmp/staging-cutover-smoke.log
            /tmp/staging-delivery-slo.log

      - name: Staging deploy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Staging Preview Summary"
            echo ""
            echo "- Precheck ready: ${{ steps.staging_precheck.outputs.ready }}"
            if [ "${{ steps.staging_precheck.outputs.ready }}" = "true" ]; then
              echo "- Preview URL: https://${FIREBASE_PROJECT_ID_STAGING}.web.app"
              echo "- Homepage guard: executed"
              echo "- Cutover smoke guard: executed"
              echo "- Delivery SLO guard: executed (strict)"
            else
              echo "- Deploy skipped due to missing staging project/credentials"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
