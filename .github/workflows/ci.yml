name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          TMP_TAR="$RUNNER_TEMP/repo.tar.gz"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o "$TMP_TAR" || curl -fsSL "$TAR_URL" -o "$TMP_TAR"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$TMP_TAR" --strip-components=1
          rm -f "$TMP_TAR"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Runtime versions
        run: |
          node --version
          corepack pnpm --version

      - name: Lockfile integrity gates
        run: |
          npm run lockfile:check
          npm run lockfile:check:functions

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Import case sensitivity gate
        run: npm run ops:imports:case

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions tests
        run: npm test
        working-directory: functions
        env:
          FIREBASE_CONFIG: '{"storageBucket":"ci-bucket.appspot.com"}'
          GCLOUD_PROJECT: ci-project

      - name: Site checks
        run: npm run check

      - name: Runtime parity assertion
        run: npm run ops:runtime-parity
        env:
          GH_ENVIRONMENT: ci
          EXPECTED_NODE_MAJOR: "20"

      - name: Build Astro site
        run: npm run build:astro

      - name: Verify Astro dist exists
        shell: bash
        run: |
          if [ ! -d "astro-site/dist" ]; then
            echo "astro-site/dist missing after build"
            exit 1
          fi

      - name: Build admin-v3 hosting bundle
        run: npm run build:admin-v3:hosting

      - name: Technical SEO validation
        run: npm run seo:validate

      - name: Asset budget report
        run: npm run perf:asset-budget

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Cross-browser smoke tests
        run: npm run test:crossbrowser

      - name: Admin v3 smoke tests
        run: npm run test:admin-v3

      - name: Admin v3 authenticated smoke tests (optional)
        shell: bash
        run: |
          if [ -n "$ADMIN_V3_E2E_EMAIL" ] && [ -n "$ADMIN_V3_E2E_PASSWORD" ]; then
            npm run test:admin-v3:auth
          else
            echo "Skipping admin-v3 authenticated smoke tests: optional secrets are not configured."
          fi
        env:
          ADMIN_V3_E2E_EMAIL: ${{ secrets['ADMIN_V3_E2E_EMAIL'] }}
          ADMIN_V3_E2E_PASSWORD: ${{ secrets['ADMIN_V3_E2E_PASSWORD'] }}

      - name: Lighthouse budgets
        run: npm run lighthouse:ci

      - name: Syntax checks
        run: |
          node --check script.js
          node --check admin-v2.js
          node --check scripts/prepare-admin-v3-hosting.js
          node --check functions/index.js
