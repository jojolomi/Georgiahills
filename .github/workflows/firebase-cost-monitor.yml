name: Firebase Cost Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read
  issues: write

jobs:
  budget-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FIREBASE_MONTHLY_BUDGET_USD: ${{ vars.FIREBASE_MONTHLY_BUDGET_USD }}
      FIREBASE_CURRENT_MONTH_COST_USD: ${{ vars.FIREBASE_CURRENT_MONTH_COST_USD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run budget threshold check
        id: budget_check
        continue-on-error: true
        run: npm run ops:firebase-cost
        env:
          GH_ENVIRONMENT: production
          FIREBASE_MONTHLY_BUDGET_USD: ${{ env.FIREBASE_MONTHLY_BUDGET_USD }}
          FIREBASE_CURRENT_MONTH_COST_USD: ${{ env.FIREBASE_CURRENT_MONTH_COST_USD }}

      - name: Create or update budget alert issue
        if: ${{ steps.budget_check.outcome != 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Firebase budget alert';
            const body = [
              'The scheduled Firebase budget monitor detected that current month spend exceeded the configured threshold.',
              '',
              `- Budget (USD): ${process.env.FIREBASE_MONTHLY_BUDGET_USD || 'unknown'}`,
              `- Current cost (USD): ${process.env.FIREBASE_CURRENT_MONTH_COST_USD || 'unknown'}`,
              `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              'Please review Firebase usage and update budget/cost variables after verification.'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const match = existing.data.find((issue) => issue.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: match.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }
        env:
          FIREBASE_MONTHLY_BUDGET_USD: ${{ env.FIREBASE_MONTHLY_BUDGET_USD }}
          FIREBASE_CURRENT_MONTH_COST_USD: ${{ env.FIREBASE_CURRENT_MONTH_COST_USD }}

      - name: Enforce budget threshold
        if: ${{ steps.budget_check.outcome != 'success' }}
        run: |
          echo "Firebase budget threshold check failed. See issue notifications for details."
          exit 1
