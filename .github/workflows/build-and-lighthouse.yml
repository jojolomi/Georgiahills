name: Build and Lighthouse

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout with fallback
        uses: ./.github/actions/checkout-with-fallback

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          run-install: "false"

      - name: Lockfile integrity gates
        run: |
          npm run lockfile:check
          npm run lockfile:check:functions

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build web app
        run: corepack pnpm --filter web build

      - name: Prepare SEO dist output
        run: npm run seo:prepare

      - name: Ensure Lighthouse port is free
        shell: bash
        run: |
          if lsof -i :3000 >/dev/null 2>&1; then
            echo "Port 3000 is busy. Releasing stale processes."
            pids=$(lsof -ti :3000)
            echo "$pids" | xargs -r kill -TERM
            sleep 2
            remaining=$(lsof -ti :3000 || true)
            if [ -n "$remaining" ]; then
              echo "$remaining" | xargs -r kill -KILL
            fi
          else
            echo "Port 3000 is free."
          fi

      - name: Lighthouse CI (mobile >= 90)
        run: npm run lighthouse:ci

      - name: Upload Lighthouse debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-debug-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            .lighthouseci/**
            reports/**

      - name: Build and Lighthouse summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Build and Lighthouse Summary"
            echo ""
            echo "- Web build: executed"
            echo "- SEO dist prep: executed"
            echo "- Lighthouse CI: executed"
            echo "- Failure artifact: lighthouse-debug-artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
