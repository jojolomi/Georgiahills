name: Build and Lighthouse

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build web app
        run: corepack pnpm --filter web build

      - name: Prepare SEO dist output
        run: npm run seo:prepare

      - name: Lighthouse CI (mobile >= 90)
        run: npm run lighthouse:ci
