name: Build and Lighthouse

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          TMP_TAR="$RUNNER_TEMP/repo.tar.gz"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o "$TMP_TAR" || curl -fsSL "$TAR_URL" -o "$TMP_TAR"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$TMP_TAR" --strip-components=1
          rm -f "$TMP_TAR"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Runtime versions
        run: |
          node --version
          corepack pnpm --version

      - name: Lockfile integrity gates
        run: |
          npm run lockfile:check
          npm run lockfile:check:functions

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build web app
        run: corepack pnpm --filter web build

      - name: Prepare SEO dist output
        run: npm run seo:prepare

      - name: Ensure Lighthouse port is free
        shell: bash
        run: |
          if lsof -i :3000 >/dev/null 2>&1; then
            echo "Port 3000 is busy. Releasing stale processes."
            lsof -ti :3000 | xargs -r kill -9
          else
            echo "Port 3000 is free."
          fi

      - name: Lighthouse CI (mobile >= 90)
        run: npm run lighthouse:ci

      - name: Upload Lighthouse debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-debug-artifacts
          if-no-files-found: ignore
          path: |
            .lighthouseci/**
            reports/**
