name: Lint and Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o repo.tar.gz || curl -fsSL "$TAR_URL" -o repo.tar.gz
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf repo.tar.gz --strip-components=1
          rm -f repo.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Core E2E tests
        run: npm run test:e2e:core
