name: Release Verify

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "artifacts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout with fallback
        uses: ./.github/actions/checkout-with-fallback

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Release verification chain
        run: |
          npm run preflight:pr
          npm run build:astro
          npm run seo:validate
          GH_BUDGET_FAIL=1 GH_ASSET_BUDGET_KB=250 GH_PAGE_BUDGET_KB=80 npm run perf:asset-budget
          npm run perf:render-blocking-css

      - name: Start local smoke server
        run: npx http-server . -p 4173 -c-1 >/tmp/http-server.log 2>&1 & echo $! > /tmp/http-server.pid

      - name: Cutover smoke guard (strict, local)
        shell: bash
        run: |
          set -euo pipefail
          trap 'kill $(cat /tmp/http-server.pid) 2>/dev/null || true' EXIT
          node scripts/audit/ops/check-cutover-smoke.js "http://127.0.0.1:4173" strict

      - name: Delivery SLO guard (warn, local)
        shell: bash
        run: |
          set -euo pipefail
          trap 'kill $(cat /tmp/http-server.pid) 2>/dev/null || true' EXIT
          node scripts/audit/ops/check-delivery-slo.js "http://127.0.0.1:4173" warn | tee /tmp/release-delivery-slo.log

      - name: Upload local server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-http-server-log
          retention-days: 7
          if-no-files-found: ignore
          path: |
            /tmp/http-server.log
            /tmp/release-delivery-slo.log

      - name: Release verification summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Verification Summary"
            echo ""
            echo "- Preflight checks: executed"
            echo "- SEO validation: executed"
            echo "- Performance checks: asset budget + render blocking CSS"
            echo "- Cutover smoke (local strict): executed"
            echo "- Delivery SLO (local warn): executed"
            echo "- Diagnostics artifact on failure: release-verify-http-server-log"
          } >> "$GITHUB_STEP_SUMMARY"
