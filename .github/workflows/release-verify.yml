name: Release Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          TMP_TAR="$RUNNER_TEMP/repo.tar.gz"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o "$TMP_TAR" || curl -fsSL "$TAR_URL" -o "$TMP_TAR"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$TMP_TAR" --strip-components=1
          rm -f "$TMP_TAR"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Runtime versions
        run: |
          node --version
          corepack pnpm --version

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Ensure workspace dependencies are installed
        run: |
          corepack pnpm --filter ./packages/ui install --frozen-lockfile
          corepack pnpm --filter ./apps/web install --frozen-lockfile
          corepack pnpm --filter ./apps/admin install --frozen-lockfile

      - name: Release verification chain
        run: |
          npm run preflight:pr
          npm run build:astro
          npm run seo:validate
          npm run perf:asset-budget
          npm run perf:render-blocking-css

      - name: Start local smoke server
        run: npx http-server . -p 4173 -c-1 >/tmp/http-server.log 2>&1 & echo $! > /tmp/http-server.pid

      - name: Cutover smoke guard (strict, local)
        shell: bash
        run: |
          set -euo pipefail
          trap 'kill $(cat /tmp/http-server.pid) 2>/dev/null || true' EXIT
          node scripts/audit/ops/check-cutover-smoke.js "http://127.0.0.1:4173" strict

      - name: Upload local server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-http-server-log
          if-no-files-found: ignore
          path: /tmp/http-server.log
