name: Firebase Cost Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  budget-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout fallback (tarball)
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAR_URL="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          TMP_TAR="$RUNNER_TEMP/repo.tar.gz"
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$TAR_URL" -o "$TMP_TAR" || curl -fsSL "$TAR_URL" -o "$TMP_TAR"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$TMP_TAR" --strip-components=1
          rm -f "$TMP_TAR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run budget threshold check
        run: npm run ops:firebase-cost
        env:
          GH_ENVIRONMENT: production
          FIREBASE_MONTHLY_BUDGET_USD: ${{ vars['FIREBASE_MONTHLY_BUDGET_USD'] }}
          FIREBASE_CURRENT_MONTH_COST_USD: ${{ vars['FIREBASE_CURRENT_MONTH_COST_USD'] }}
